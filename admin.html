<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormaMaker — Admin</title>
  <link rel="icon" type="image/png" href="assets/icon/FormaMaker-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Admin shell ── */
    .admin-wrap { min-height: 100vh; background: var(--bg-alt); }

    /* ── Login ── */
    .login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: clamp(28px, 5vw, 48px);
      width: 100%; max-width: 380px;
      box-shadow: var(--shadow-md);
    }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .login-logo .logo-mark {
      width: 32px; height: 32px; border-radius: var(--radius-md);
      background: var(--accent); display: inline-block;
    }
    .login-logo .logo-text { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; }
    .login-badge {
      font-size: .65rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--accent);
      background: var(--accent-light); border: 1px solid rgba(79,70,229,.2);
      padding: 2px 8px; border-radius: 999px; margin-left: 4px;
    }
    .login-title { font-size: 1.2rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
    .login-sub   { font-size: .85rem; color: var(--text-muted); margin-bottom: 24px; }

    /* ── Admin header ── */
    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(16px, 4vw, 40px);
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header-left { display: flex; align-items: center; gap: 12px; }
    .admin-header .logo-mark {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--accent); display: inline-block; flex-shrink: 0;
    }
    .admin-header .logo-text { font-size: 1rem; font-weight: 700; letter-spacing: -.02em; }
    .admin-header .logo-badge {
      font-size: .6rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--accent);
      background: var(--accent-light); border: 1px solid rgba(79,70,229,.2);
      padding: 2px 7px; border-radius: 999px;
    }
    .admin-user { font-size: .8rem; color: var(--text-muted); }

    /* ── Dashboard body ── */
    .admin-body { padding: clamp(20px, 4vw, 40px); max-width: 1100px; margin-inline: auto; }

    /* ── Stat cards ── */
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      box-shadow: var(--shadow-xs);
    }
    .stat-card-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 6px; }
    .stat-card-value { font-size: 1.6rem; font-weight: 700; letter-spacing: -.03em; color: var(--text); }

    /* ── Filter bar ── */
    .orders-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      margin-bottom: 16px;
    }
    .orders-title { font-size: 1rem; font-weight: 700; letter-spacing: -.01em; }
    .status-filters { display: flex; flex-wrap: wrap; gap: 6px; }
    .status-filter-btn {
      padding: 5px 13px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: .78rem; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }
    .status-filter-btn.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }

    /* ── Orders list ── */
    .orders-list { display: flex; flex-direction: column; gap: 10px; }

    .order-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-xs);
      transition: border-color var(--transition);
    }
    .order-card:hover { border-color: var(--border-mid); }

    .order-summary {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      cursor: pointer;
    }
    @media (max-width: 640px) {
      .order-summary { grid-template-columns: 1fr auto auto; }
      .order-col-date, .order-col-total { display: none; }
    }

    .order-col-main {}
    .order-id { font-size: .7rem; color: var(--text-muted); font-family: monospace; margin-bottom: 3px; }
    .order-customer { font-size: .9rem; font-weight: 600; color: var(--text); }
    .order-items-count { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }

    .order-col-date { font-size: .8rem; color: var(--text-muted); white-space: nowrap; }
    .order-col-total { font-size: .9rem; font-weight: 700; color: var(--text); white-space: nowrap; }

    .status-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: .72rem; font-weight: 700;
      letter-spacing: .03em; white-space: nowrap;
      border: 1.5px solid transparent;
    }
    .status-new          { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
    .status-confirmed    { background: #F0FDF4; color: #15803D; border-color: #BBF7D0; }
    .status-in-progress  { background: #FFFBEB; color: #B45309; border-color: #FDE68A; }
    .status-ready        { background: #F5F3FF; color: #6D28D9; border-color: #DDD6FE; }
    .status-delivered    { background: #F7F7F8; color: #71717A; border-color: #E8E8EC; }
    .status-cancelled    { background: #FEF2F2; color: #B91C1C; border-color: #FECACA; }

    .order-toggle-icon {
      font-size: .75rem; color: var(--text-muted);
      transition: transform .2s ease;
      flex-shrink: 0;
    }
    .order-card.expanded .order-toggle-icon { transform: rotate(180deg); }

    /* ── Order detail panel ── */
    .order-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 20px;
      background: var(--bg-alt);
    }
    .order-card.expanded .order-detail { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 580px) { .detail-grid { grid-template-columns: 1fr; } }

    .detail-section-label {
      font-size: .7rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 8px;
    }
    .detail-val { font-size: .875rem; color: var(--text-mid); line-height: 1.6; }

    .order-items-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .order-items-table th {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted);
      padding: 6px 10px; border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .order-items-table td {
      font-size: .85rem; color: var(--text-mid);
      padding: 8px 10px; border-bottom: 1px solid var(--border);
    }
    .order-items-table tr:last-child td { border-bottom: none; }
    .order-items-table .td-right { text-align: right; font-weight: 600; color: var(--text); }

    .order-total-row {
      display: flex; justify-content: flex-end;
      gap: 16px; align-items: center;
      padding-top: 10px;
      font-size: .875rem;
    }
    .order-total-row strong { font-size: 1rem; font-weight: 700; color: var(--text); }

    /* ── Status update ── */
    .status-update-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .status-update-bar label { font-size: .8rem; font-weight: 600; color: var(--text-mid); }
    .status-select {
      padding: 7px 12px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: .85rem; font-weight: 500;
      color: var(--text);
      cursor: pointer;
    }
    .status-select:focus { outline: none; box-shadow: var(--accent-glow); border-color: var(--accent); }

    /* ── Empty / loading states ── */
    .admin-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: .9rem;
    }
    .admin-state-icon { font-size: 2rem; margin-bottom: 12px; }

    /* ── Form groups (reuse from main site) ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: .8rem; font-weight: 600; color: var(--text-mid); }
    .form-group input {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: .9rem;
      background: var(--bg);
      color: var(--text);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: var(--accent-glow); }
    .login-error {
      font-size: .8rem; color: var(--error); background: var(--error-bg);
      border: 1px solid #FCA5A5; border-radius: var(--radius-md);
      padding: 8px 12px; margin-bottom: 12px; display: none;
    }
    .login-error.visible { display: block; }

    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 14px; font-size: .8rem; }
    .btn-danger {
      background: var(--error-bg); color: var(--error);
      border-color: #FCA5A5;
    }
    .btn-danger:hover { background: #FEE2E2; }
  </style>
</head>
<body>
<div class="admin-wrap">

  <!-- ═══ LOGIN SCREEN ════════════════════════════════════════════════════════ -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-mark"></span>
        <span class="logo-text">FormaMaker</span>
        <span class="login-badge">Admin</span>
      </div>
      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">Access your orders dashboard.</p>

      <div id="login-error" class="login-error" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" autocomplete="email" placeholder="admin@example.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-full btn-lg">Sign In</button>
      </form>
    </div>
  </div>


  <!-- ═══ DASHBOARD ════════════════════════════════════════════════════════════ -->
  <div id="dashboard" style="display:none;">

    <header class="admin-header">
      <div class="admin-header-left">
        <span class="logo-mark"></span>
        <span class="logo-text">FormaMaker</span>
        <span class="logo-badge">Admin</span>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <span class="admin-user" id="admin-user-email"></span>
        <button id="signout-btn" class="btn btn-danger btn-sm">Sign Out</button>
      </div>
    </header>

    <div class="admin-body">

      <!-- Stats row -->
      <div class="admin-stats">
        <div class="stat-card">
          <div class="stat-card-label">Total Orders</div>
          <div class="stat-card-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">New</div>
          <div class="stat-card-value" id="stat-new">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">In Progress</div>
          <div class="stat-card-value" id="stat-progress">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Delivered</div>
          <div class="stat-card-value" id="stat-delivered">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Revenue</div>
          <div class="stat-card-value" id="stat-revenue">—</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="orders-toolbar">
        <span class="orders-title">Orders</span>
        <div class="status-filters" role="group" aria-label="Filter by status">
          <button class="status-filter-btn active" data-status="all">All</button>
          <button class="status-filter-btn" data-status="new">New</button>
          <button class="status-filter-btn" data-status="confirmed">Confirmed</button>
          <button class="status-filter-btn" data-status="in-progress">In Progress</button>
          <button class="status-filter-btn" data-status="ready">Ready</button>
          <button class="status-filter-btn" data-status="delivered">Delivered</button>
          <button class="status-filter-btn" data-status="cancelled">Cancelled</button>
        </div>
      </div>

      <!-- Orders list -->
      <div id="orders-list" class="orders-list">
        <div class="admin-state">
          <div class="admin-state-icon">○</div>
          <p>Loading orders…</p>
        </div>
      </div>

    </div>
  </div>

</div>
<script type="module" src="admin.js"></script>
</body>
</html>
